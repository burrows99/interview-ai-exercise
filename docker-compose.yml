services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - 11434:11434
    volumes:
      - ./ollama:/root/.ollama
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
        ollama serve &
        until ollama list > /dev/null 2>&1; do sleep 1; done;
        ollama pull $$OLLAMA_MODEL;
        ollama pull $$OLLAMA_EMBEDDINGS_MODEL;
        touch /tmp/models-ready;
        wait
      "
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/models-ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 80:80
    env_file:
      - .env
    volumes:
      - ./ai_exercise:/code/ai_exercise
    depends_on:
      ollama:
        condition: service_healthy
